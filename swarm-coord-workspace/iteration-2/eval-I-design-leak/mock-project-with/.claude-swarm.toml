spec_dir           = "specs/"
briefs_dir         = ".swarm/briefs/"
type_contract_path = "src/types.py"
umbrella_test_cmd  = "pytest tests/umbrella_test.py -x"
parent_owned       = [
  "src/types.py",
  "tests/conftest.py",
  "tests/umbrella*.py",
